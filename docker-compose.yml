services:
  postgres:
    image: postgres:15-alpine
    container_name: site_eli_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-siteeli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_env}
      POSTGRES_DB: ${POSTGRES_DB:-site_eli}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
