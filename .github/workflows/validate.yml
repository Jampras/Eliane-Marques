name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NEXT_PUBLIC_SITE_URL: https://example.com
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_fake
      ADMIN_SESSION_SECRET: this-is-a-ci-only-secret-with-more-than-32-characters
      ADMIN_GOOGLE_ALLOWED_EMAILS: admin@example.com
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/app_test
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/app_test
      DATA_QUERY_FAIL_FAST: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Prisma schema validate
        run: npx prisma validate

      - name: Apply migrations
        run: npm run db:deploy

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
