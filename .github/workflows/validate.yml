name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Prisma schema validate
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_fake
          ADMIN_SESSION_SECRET: this-is-a-ci-only-secret-with-more-than-32-characters
          ADMIN_GOOGLE_ALLOWED_EMAILS: admin@example.com
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          DATA_QUERY_FAIL_FAST: 'false'
        run: npm run build
